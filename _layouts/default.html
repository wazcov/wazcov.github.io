<!DOCTYPE html>
<html>
<head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
    <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css"/>
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}"
          href="{{ site.baseurl }}/feed.xml"/>

</head>

<body>
<div class="wrapper-masthead">
    <div class="container">
        <header class="masthead clearfix">
            <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}"/></a>

            <div class="site-info">
                <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
                <p class="site-description">{{ site.description }}</p>
            </div>

            <nav>
                <a href="{{ site.baseurl }}/">Blog</a>
                <a href="{{ site.baseurl }}/shop">Shop</a>
                <a href="{{ site.baseurl }}/skills">Skills</a>
                <a href="{{ site.baseurl }}/podcast">Podcast</a>
                <a href="{{ site.baseurl }}/speaking">Speaking</a>
            </nav>
        </header>
    </div>
</div>

<div id="main" role="main" class="container">
    <div class="row no-gutters">
        <div class="col-sm-6">
            {{ content }}
        </div>
        <div class="col-sm-6" style="text-align: center;">
            {% include svg-icons.html %}
            <h3>My Latest Video:</h3>
            <iframe width="600" height="340" src="https://www.youtube.com/embed?listType=user_uploads&list=MrWayneio"
                    frameborder="0" allowfullscreen></iframe>
            <br />
            <a href="http://youtube.com/c/devscover?sub_confirmation=1"><img
                    src="https://raw.githubusercontent.com/wazcov/wazcov.github.io/master/images/subscribe.png"></a>
        </div>
    </div>
</div>

<div class="wrapper-footer">
    <div class="container">
        <footer class="footer">
            {% include svg-icons.html %}
        </footer>
    </div>
</div>

{% include analytics.html %}
</body>
</html>
